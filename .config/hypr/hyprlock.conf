source = ~/.config/hypr/machine-specific/$HYPR_HOST/hyprlock.conf

$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    color = rgba(1a1b26ff)
}

input-field {
    monitor = $INPUT_FIELD_MONITOR
    size = 20%, 5%
    outline_thickness = 5
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(8d3ef0ff) rgba(fb6389ff) 90deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Password
    fail_text = $PAMFAIL

    check_text = Authenticating

    dots_spacing = 0.3

    position = 0, -250
    halign = center
    valign = center
}

# TIME
label {
    text = $TIME 
    font_size = 200
    font_family = $font ExtraBold
    color = rgba(fb6389ff)

    position = 0, 250
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:60000] date +"%d %B %Y"
    font_size = 40
    font_family = $font ExtraBold
    color = rgba(fb6389ff)

    position = 0, 50
    halign = center
    valign = center
}

# Day
label {
    text = cmd[update:60000] date +"%A"
    font_size = 40
    font_family = $font ExtraBold
    color = rgba(fb6389ff)

    position = 0, -50
    halign = center
    valign = center
}
